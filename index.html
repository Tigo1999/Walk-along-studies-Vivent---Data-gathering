<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>Behavior Logger V3</title>

<style>
:root{
  --bg:#f3f4f6; --card:#fff; --top:#e8eaee;
  --text:#17233b; --muted:#5b6474;

  --green:#cfe6cf; --green-b:#8bc58f;
  --yellow:#efe6b3; --yellow-b:#d7be49;
  --orange:#f1d0ae; --orange-b:#e2a45f;
  --blue:#cfe0f3; --blue-b:#7ea6d6;

  --radius:16px; --shadow:0 2px 8px rgba(0,0,0,.08);
  --gap:8px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);font-family:Arial;overflow:hidden;}
body{padding:12px;}

.app{
  height:calc(100vh - 24px);
  display:grid;
  grid-template-rows:auto auto auto minmax(64px,1fr);
  gap:var(--gap);
}

.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--gap);
}

.control-btn{
  border:none;border-radius:16px;background:var(--top);
  font-size:13px;font-weight:700;height:50px;
  box-shadow:var(--shadow);
  color:var(--text);
}

.status-card{
  background:var(--card);border-radius:18px;
  box-shadow:var(--shadow);padding:12px 16px;
}
.status-title{font-weight:800;font-size:14px;margin-bottom:4px;}
.status-time{font-size:12px;color:var(--muted);}

.behavior-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:64px 64px 64px 48px;
  gap:var(--gap);
  grid-template-areas:
    "g1 g2 y1"
    "o1 o2 y2"
    "o3 o4 b1"
    "b2 b3 b4";
}

.event-btn{
  border:2px solid transparent;
  border-radius:18px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:6px;
  box-shadow:var(--shadow);
  color:var(--text);
}

.code{font-size:20px;font-weight:800;line-height:1;}
.desc{font-size:9px;line-height:1.1;margin-top:3px;}

.green{background:var(--green);border-color:var(--green-b);}
.yellow{background:var(--yellow);border-color:var(--yellow-b);}
.orange{background:var(--orange);border-color:var(--orange-b);}
.blue{background:var(--blue);border-color:var(--blue-b);}

.g1{grid-area:g1;} .g2{grid-area:g2;}
.y1{grid-area:y1;} .y2{grid-area:y2;}
.o1{grid-area:o1;} .o2{grid-area:o2;}
.o3{grid-area:o3;} .o4{grid-area:o4;}
.b1{grid-area:b1;} .b2{grid-area:b2;} .b3{grid-area:b3;} .b4{grid-area:b4;}

.log-panel{
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-rows:auto 1fr;
  overflow:hidden;
}

.log-header{
  font-size:12px;
  font-weight:700;
  padding:8px;
  border-bottom:1px solid #eee;
}

.log-list{
  overflow:auto;
  padding:8px;
  font-size:11px;
}

.log-entry{
  padding:4px 0;
  border-bottom:1px solid #eee;
}

.log-entry:last-child{
  border-bottom:none;
}
</style>
</head>

<body>
<div class="app">

  <div class="controls">
    <button class="control-btn" onclick="confirmStart()">Start</button>
    <button class="control-btn" onclick="confirmPause()">Pause</button>
    <button class="control-btn" onclick="confirmReset()">Reset</button>
    <button class="control-btn" onclick="note()">Note</button>
    <button class="control-btn" onclick="download()">Download</button>
    <button class="control-btn" onclick="undo()">Undo</button>
  </div>

  <div class="status-card">
    <div class="status-title" id="status">Not started</div>
    <div class="status-time">Time: <span id="time">00:00:00</span></div>
  </div>

  <div class="behavior-grid">

    <!-- GREEN -->
    <button class="event-btn green g1" onclick="log('SL','Slowing down')">
      <div class="code">SL</div><div class="desc">Slowing down</div>
    </button>

    <button class="event-btn green g2" onclick="log('SS','Short scanning')">
      <div class="code">SS</div><div class="desc">Short scanning</div>
    </button>

    <!-- YELLOW -->
    <button class="event-btn yellow y1" onclick="log('RS','Repeated scanning')">
      <div class="code">RS</div><div class="desc">Repeated scanning</div>
    </button>

    <button class="event-btn yellow y2" onclick="log('ST','Stop')">
      <div class="code">ST</div><div class="desc">Stop</div>
    </button>

    <!-- ORANGE -->
    <button class="event-btn orange o1" onclick="log('WD','Wrong direction')">
      <div class="code">WD</div><div class="desc">Wrong direction</div>
    </button>

    <button class="event-btn orange o2" onclick="log('RC','Route Correction')">
      <div class="code">RC</div><div class="desc">Route correction</div>
    </button>

    <button class="event-btn orange o3" onclick="log('AC','Acceleration')">
      <div class="code">AC</div><div class="desc">Acceleration</div>
    </button>

    <!-- BLUE -->
    <button class="event-btn blue o4" onclick="log('CS','Compass shifting')">
      <div class="code">CS</div><div class="desc">Compass shifting</div>
    </button>

    <button class="event-btn blue b1" onclick="log('DC','Decision')">
      <div class="code">DC</div><div class="desc">Decision</div>
    </button>

    <button class="event-btn blue b2" onclick="log('NR','No reaction')">
      <div class="code">NR</div><div class="desc">No reaction</div>
    </button>

    <button class="event-btn blue b3" onclick="log('CR','Rorrect response')">
      <div class="code">CR</div><div class="desc">Correct response</div>
    </button>

    <button class="event-btn blue b4" onclick="log('IV','Intervention')">
      <div class="code">IV</div><div class="desc">Intervention</div>
    </button>

  </div>

  <div class="log-panel">
    <div class="log-header">Log</div>
    <div class="log-list" id="log"></div>
  </div>

</div>

<script>
let logs = [];
let startTime = 0;
let running = false;
let pausedElapsed = 0;
let timerInterval = null;

function format(t){
  let s = Math.floor(t / 1000);
  let h = String(Math.floor(s / 3600)).padStart(2,'0');
  let m = String(Math.floor((s % 3600) / 60)).padStart(2,'0');
  let sec = String(s % 60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function getElapsed(){
  if (!startTime) return 0;
  return running ? (Date.now() - startTime) : pausedElapsed;
}

function ensureTimer(){
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    document.getElementById("time").innerText = format(getElapsed());

    if (startTime === 0) {
      document.getElementById("status").innerText = "Not started";
    } else if (running) {
      document.getElementById("status").innerText = "Running";
    } else {
      document.getElementById("status").innerText = "Paused";
    }
  }, 200);
}

function start(){
  startTime = Date.now();
  pausedElapsed = 0;
  running = true;
  logs = [];
  render();
  ensureTimer();
}

function pause(){
  if (startTime === 0) return;

  if (running) {
    pausedElapsed = Date.now() - startTime;
    running = false;
  } else {
    startTime = Date.now() - pausedElapsed;
    running = true;
  }
}

function reset(){
  running = false;
  startTime = 0;
  pausedElapsed = 0;
  logs = [];
  render();
  document.getElementById("time").innerText = "00:00:00";
  document.getElementById("status").innerText = "Not started";
}

function undo(){
  logs.pop();
  render();
}

function note(){
  let t = prompt("Note");
  if (t) log("NOTE", t);
}

function log(code, label){
  if (!running) return;
  let t = getElapsed();
  logs.push({ t, code, label });
  render();
}

function render(){
  let el = document.getElementById("log");
  el.innerHTML = "";
  logs.slice().reverse().forEach(l => {
    let d = document.createElement("div");
    d.className = "log-entry";
    d.innerHTML = `${format(l.t)} - ${l.code} ${l.label}`;
    el.appendChild(d);
  });
}

function download(){
  let csv = "time,code,label\n";
  logs.forEach(l => {
    const safeLabel = String(l.label).replace(/"/g, '""');
    csv += `${format(l.t)},${l.code},"${safeLabel}"\n`;
  });
  let blob = new Blob([csv], { type: "text/csv" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "log.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

function confirmStart(){
  const ok = confirm("Start a new session? This will clear the current log.");
  if (ok) start();
}

function confirmPause(){
  if (startTime === 0) {
    alert("Start a session first.");
    return;
  }

  const message = running
    ? "Pause the current session?"
    : "Resume the current session?";

  const ok = confirm(message);
  if (ok) pause();
}

function confirmReset(){
  const ok = confirm("Reset the session and clear all logs?");
  if (ok) reset();
}

ensureTimer();
render();
</script>

</body>
</html>
