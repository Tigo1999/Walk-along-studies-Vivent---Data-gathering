<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<title>Behavior Logger</title>

<style>
:root{
  --bg:#f3f4f6; --card:#fff; --top:#e8eaee;
  --text:#17233b; --muted:#5b6474;

  --green:#cfe6cf; --green-b:#8bc58f;
  --yellow:#efe6b3; --yellow-b:#d7be49;
  --orange:#f1d0ae; --orange-b:#e2a45f;
  --blue:#cfe0f3; --blue-b:#7ea6d6;

  --radius:16px; --shadow:0 2px 8px rgba(0,0,0,.08);
  --gap:8px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;background:var(--bg);font-family:Arial;overflow:hidden;}
body{padding:12px;}

.app{
  height:calc(100vh - 24px);
  display:grid;
  grid-template-rows:auto auto auto minmax(64px,1fr);
  gap:var(--gap);
}

.controls{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--gap);
}

.control-btn{
  border:none;border-radius:16px;background:var(--top);
  font-size:13px;font-weight:700;height:50px;
  box-shadow:var(--shadow);
}

.status-card{
  background:var(--card);border-radius:18px;
  box-shadow:var(--shadow);padding:12px 16px;
}
.status-title{font-weight:800;font-size:14px;margin-bottom:4px;}
.status-time{font-size:12px;color:var(--muted);}

.behavior-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:64px 64px 64px 48px;
  gap:var(--gap);
  grid-template-areas:
    "g1 g2 y1"
    "o1 o2 y2"
    "o3 o4 y2"
    "b1 b2 b3";
}

.event-btn{
  border:2px solid transparent;
  border-radius:18px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:6px;
  box-shadow:var(--shadow);
}

.code{font-size:20px;font-weight:800;}
.desc{font-size:9px;}

.green{background:var(--green);border-color:var(--green-b);}
.yellow{background:var(--yellow);border-color:var(--yellow-b);}
.orange{background:var(--orange);border-color:var(--orange-b);}
.blue{background:var(--blue);border-color:var(--blue-b);}

.g1{grid-area:g1;} .g2{grid-area:g2;}
.y1{grid-area:y1;} .y2{grid-area:y2;}
.o1{grid-area:o1;} .o2{grid-area:o2;}
.o3{grid-area:o3;} .o4{grid-area:o4;}
.b1{grid-area:b1;} .b2{grid-area:b2;} .b3{grid-area:b3;}

.log-panel{
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  display:grid;
  grid-template-rows:auto 1fr;
}

.log-header{font-size:12px;font-weight:700;padding:8px;border-bottom:1px solid #eee;}
.log-list{overflow:auto;padding:8px;font-size:11px;}
.log-entry{padding:4px 0;border-bottom:1px solid #eee;}

</style>
</head>

<body>
<div class="app">

<div class="controls">
<button class="control-btn" onclick="start()">Start</button>
<button class="control-btn" onclick="pause()">Pause</button>
<button class="control-btn" onclick="reset()">Reset</button>
<button class="control-btn" onclick="note()">Note</button>
<button class="control-btn" onclick="download()">Download</button>
<button class="control-btn" onclick="undo()">Undo</button>
</div>

<div class="status-card">
<div class="status-title" id="status">Not started</div>
<div class="status-time">Time: <span id="time">00:00:00</span></div>
</div>

<div class="behavior-grid">

<!-- GREEN -->
<button class="event-btn green g1" onclick="log('SL','slowing down')">
<div class="code">SL</div><div class="desc">slowing</div>
</button>

<button class="event-btn green g2" onclick="log('SS','short scanning')">
<div class="code">SS</div><div class="desc">scan</div>
</button>

<!-- YELLOW -->
<button class="event-btn yellow y1" onclick="log('ST','stop')">
<div class="code">ST</div><div class="desc">stop</div>
</button>

<button class="event-btn yellow y2" onclick="log('RS','repeat scan')">
<div class="code">RS</div><div class="desc">repeat</div>
</button>

<!-- ORANGE -->
<button class="event-btn orange o1" onclick="log('WD','wrong direction')">
<div class="code">WD</div><div class="desc">wrong dir</div>
</button>

<button class="event-btn orange o2" onclick="log('RT','returning')">
<div class="code">RT</div><div class="desc">return</div>
</button>

<button class="event-btn orange o3" onclick="log('FP','faster pace')">
<div class="code">FP</div><div class="desc">faster</div>
</button>

<button class="event-btn orange o4" onclick="log('RS2','reorienting')">
<div class="code">RO</div><div class="desc">reorient</div>
</button>

<!-- BLUE -->
<button class="event-btn blue b1" onclick="log('DC','decision')">
<div class="code">DC</div><div class="desc">decision</div>
</button>

<button class="event-btn blue b2" onclick="log('NR','no reaction')">
<div class="code">NR</div><div class="desc">no react</div>
</button>

<button class="event-btn blue b3" onclick="log('CR','correct response')">
<div class="code">CR</div><div class="desc">correct</div>
</button>

</div>

<div class="log-panel">
<div class="log-header">Log</div>
<div class="log-list" id="log"></div>
</div>

</div>

<script>
let logs=[];let startTime=0;let running=false;

function format(t){
let s=Math.floor(t/1000);
let h=String(Math.floor(s/3600)).padStart(2,'0');
let m=String(Math.floor((s%3600)/60)).padStart(2,'0');
let sec=String(s%60).padStart(2,'0');
return `${h}:${m}:${sec}`;
}

function start(){startTime=Date.now();running=true;logs=[];update();}
function pause(){running=!running;}
function reset(){running=false;logs=[];update();}
function undo(){logs.pop();render();}
function note(){let t=prompt("note");if(t)log("NOTE",t);}

function log(code,label){
if(!running)return;
let t=Date.now()-startTime;
logs.push({t,code,label});
render();
}

function render(){
let el=document.getElementById("log");
el.innerHTML="";
logs.slice().reverse().forEach(l=>{
let d=document.createElement("div");
d.className="log-entry";
d.innerHTML=`${format(l.t)} - ${l.code} ${l.label}`;
el.appendChild(d);
});
}

function update(){
setInterval(()=>{
if(running){
document.getElementById("time").innerText=format(Date.now()-startTime);
document.getElementById("status").innerText="Running";
}else{
document.getElementById("status").innerText="Paused / Not started";
}
},200);
}

function download(){
let csv="time,code,label\n";
logs.forEach(l=>{
csv+=`${format(l.t)},${l.code},${l.label}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="log.csv";
a.click();
}
</script>

</body>
</html>
